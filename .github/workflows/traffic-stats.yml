name: Traffic Stats

on:
  schedule:
    # Daily at 06:00 UTC (14:00 Taiwan time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect stats
        env:
          # Use TRAFFIC_TOKEN (PAT with repo scope) for traffic API if available,
          # otherwise fall back to GITHUB_TOKEN (traffic endpoints will be skipped)
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN_DEFAULT: ${{ secrets.GITHUB_TOKEN }}
          HAS_TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN != '' }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          DATE=$(date -u +%Y-%m-%d)

          # --- GitHub Traffic (requires PAT with repo scope) ---
          CLONES='null'
          VIEWS='null'
          REFERRERS='null'
          if [[ "$HAS_TRAFFIC_TOKEN" == "true" ]]; then
            CLONES=$(gh api "repos/$REPO/traffic/clones" --jq '{total: .count, unique: .uniques}' 2>/dev/null || echo 'null')
            VIEWS=$(gh api "repos/$REPO/traffic/views" --jq '{total: .count, unique: .uniques}' 2>/dev/null || echo 'null')
            REFERRERS=$(gh api "repos/$REPO/traffic/popular/referrers" --jq '[.[] | {referrer, count, uniques}]' 2>/dev/null || echo 'null')
            echo "Traffic data collected via PAT"
          else
            echo "No TRAFFIC_TOKEN secret — skipping traffic endpoints (needs PAT with repo scope)"
          fi

          # --- GitHub Release downloads (works with GITHUB_TOKEN) ---
          export GH_TOKEN="$GH_TOKEN_DEFAULT"
          RELEASES=$(gh api "repos/$REPO/releases" --jq '[.[] | {tag: .tag_name, assets: [.assets[] | {name, downloads: .download_count}]}]' 2>/dev/null || echo '[]')

          # --- GitHub stars & forks (works with GITHUB_TOKEN) ---
          REPO_INFO=$(gh api "repos/$REPO" --jq '{stars: .stargazers_count, forks: .forks_count, watchers: .subscribers_count}' 2>/dev/null || echo '{"stars":0,"forks":0,"watchers":0}')

          # --- npm downloads (no auth needed) ---
          NPM_WEEKLY=$(curl -sf "https://api.npmjs.org/downloads/point/last-week/claud-prism-aireview" | jq -r '.downloads // 0' || echo '0')
          NPM_MONTHLY=$(curl -sf "https://api.npmjs.org/downloads/point/last-month/claud-prism-aireview" | jq -r '.downloads // 0' || echo '0')

          # --- Build JSON record ---
          RECORD=$(jq -nc \
            --arg date "$DATE" \
            --argjson clones "$CLONES" \
            --argjson views "$VIEWS" \
            --argjson referrers "$REFERRERS" \
            --argjson releases "$RELEASES" \
            --argjson repo "$REPO_INFO" \
            --argjson npm_weekly "$NPM_WEEKLY" \
            --argjson npm_monthly "$NPM_MONTHLY" \
            '{
              date: $date,
              github: {
                clones: $clones,
                views: $views,
                referrers: $referrers,
                releases: $releases,
                stars: $repo.stars,
                forks: $repo.forks,
                watchers: $repo.watchers
              },
              npm: {
                weekly: $npm_weekly,
                monthly: $npm_monthly
              }
            }')

          echo "$RECORD" > /tmp/today.json
          echo "--- Stats for $DATE ---"
          echo "$RECORD" | jq .

      - name: Push to stats branch
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if stats branch exists on remote
          if git ls-remote --exit-code origin refs/heads/stats >/dev/null 2>&1; then
            git fetch origin stats
            git checkout stats
          else
            # Create orphan branch with no history
            git checkout --orphan stats
            git rm -rf . 2>/dev/null || true
            echo "# Traffic Stats" > README.md
            echo "" >> README.md
            echo "Auto-collected daily by GitHub Actions. One JSON record per line per day." >> README.md
            echo "" >> README.md
            echo "Query with: \`cat traffic.jsonl | jq -s '.[] | select(.date >= \"2026-03-01\")'\`" >> README.md
            git add README.md
            git commit -m "chore: init stats branch"
          fi

          # Append today's record (skip if already recorded today)
          if [ -f traffic.jsonl ] && grep -q "\"date\":\"$DATE\"" traffic.jsonl; then
            echo "Already have a record for $DATE, skipping"
          else
            cat /tmp/today.json >> traffic.jsonl
            echo "" >> traffic.jsonl
            git add traffic.jsonl
            git commit -m "stats: $DATE"
            git push origin stats
          fi
