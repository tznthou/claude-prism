# AI Code Review — Multi-provider review powered by claude-prism
#
# Trigger modes (choose one):
#   1. Label trigger (default) — add "ai-review" label to a PR
#   2. Auto trigger — uncomment the pull_request block below
#
# Required secrets: at least one of GEMINI_API_KEY, OPENAI_API_KEY, ANTHROPIC_API_KEY
# Optional secrets: all three for full multi-provider synthesis

name: AI Code Review

# --- Label trigger (default) ---
on:
  pull_request:
    types: [labeled]

# --- Auto trigger (uncomment to replace label trigger) ---
# on:
#   pull_request:
#     types: [opened, synchronize]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    # For label trigger: only run when "ai-review" label is added
    # For auto trigger: remove this if condition
    if: ${{ github.event.label.name == 'ai-review' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR diff
        id: diff
        run: |
          gh pr diff "$PR_NUMBER" > "$RUNNER_TEMP/pr.diff"
          echo "has_diff=$([ -s "$RUNNER_TEMP/pr.diff" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AI review
        if: steps.diff.outputs.has_diff == 'true'
        run: |
          scripts/ci-review.sh \
            --diff "$RUNNER_TEMP/pr.diff" \
            --pr "$PR_NUMBER"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip empty diff
        if: steps.diff.outputs.has_diff == 'false'
        run: echo "No changes to review."
