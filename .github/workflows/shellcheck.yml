# ShellCheck — Static analysis for shell scripts
#
# Runs on every PR and push to main.
# Catches common shell scripting bugs, security issues, and style problems.

name: ShellCheck

on:
  push:
    branches: [main]
    paths: ['**/*.sh']
  pull_request:
    paths: ['**/*.sh']

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
