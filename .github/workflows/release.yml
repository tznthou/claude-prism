# Release — Create GitHub Release + publish to npm
#
# Triggered by pushing a version tag (e.g., v0.8.0).
# 1. Verifies checksums and runs smoke tests
# 2. Creates a GitHub Release with tarball
# 3. Publishes to npm registry

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify checksums
        run: shasum -a 256 -c checksums.sha256

      - name: Run smoke tests (file existence only)
        run: |
          # Verify all distributable files exist
          for f in install.sh uninstall.sh checksums.sha256 LICENSE README.md bin/claude-prism.js package.json; do
            test -f "$f" || { echo "Missing: $f"; exit 1; }
          done
          for f in commands/*.md; do
            test -f "$f" || { echo "Missing commands"; exit 1; }
          done
          for f in scripts/*.sh; do
            test -f "$f" || { echo "Missing scripts"; exit 1; }
          done
          echo "All files present."

      - name: Create release tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar czf "claude-prism-${VERSION}.tar.gz" \
            commands/ scripts/ bin/ \
            install.sh uninstall.sh checksums.sha256 \
            package.json LICENSE README.md
          shasum -a 256 "claude-prism-${VERSION}.tar.gz" > "claude-prism-${VERSION}.tar.gz.sha256"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$VERSION" \
            "claude-prism-${VERSION}.tar.gz" \
            "claude-prism-${VERSION}.tar.gz.sha256" \
            --generate-notes

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
